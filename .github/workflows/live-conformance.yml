name: live-conformance

# Runs the conformance suite against the deployed workers.dev instance.
# Runs from a GitHub runner (low RTT to Cloudflare's edge) because the
# suite's 5s per-test budget assumes a nearby server.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LIVE_URL: https://durable-object-streams.openstory.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run conformance suite against deployed instance
        # --testTimeout raises vitest's 5s default (which assumes a local
        # server) to accommodate real network RTT: the property-based tests
        # issue up to ~1,200 sequential round-trips. --retry=2 absorbs the
        # one transport-level flake (Cloudflare's edge re-chunks SSE
        # responses, racing the suite's chunk-boundary-sensitive SSE
        # reader — see NOTES.md). Same tests, same assertions.
        # pipefail keeps a failing suite failing the build through tee.
        run: |
          set -o pipefail
          CONFORMANCE_TEST_URL="$LIVE_URL" pnpm exec vitest run --no-coverage --testTimeout=120000 --retry=2 conformance/conformance.test.mjs 2>&1 | tee live-conformance-summary.txt

      - name: Run client smoke test against deployed instance
        run: node scripts/smoke-test.mjs "$LIVE_URL"

      - name: Upload conformance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-conformance-summary
          path: live-conformance-summary.txt
