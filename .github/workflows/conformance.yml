name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build library
        run: pnpm build

      - name: Boot wrangler dev
        run: |
          pnpm exec wrangler dev --port 8787 > wrangler-dev.log 2>&1 &
          echo $! > wrangler.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8787/ > /dev/null; then
              echo "wrangler dev is up"
              exit 0
            fi
            sleep 1
          done
          echo "wrangler dev failed to start" >&2
          cat wrangler-dev.log >&2
          exit 1

      - name: Run conformance suite
        run: CONFORMANCE_TEST_URL=http://localhost:8787 pnpm exec vitest run --no-coverage conformance/conformance.test.mjs

      - name: Run client smoke test
        run: node scripts/smoke-test.mjs http://localhost:8787

      - name: Stop wrangler dev
        if: always()
        run: kill "$(cat wrangler.pid)" 2>/dev/null || true

      - name: Upload wrangler log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-dev-log
          path: wrangler-dev.log
